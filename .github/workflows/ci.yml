name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Pin actions to commit SHAs — supply chain hardening [Fix 8]
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Lint
        run: npx eslint@9 js/ -c eslint.config.js

      - name: Unit tests
        run: |
          node tests/maze.test.js
          node tests/player.test.js
          node tests/game-state.test.js
          node tests/edge-cases.test.js
          node tests/integration.test.js
          node tests/qa-gamestate-maze-integration.test.js
          node tests/qa-save-load.test.js
          node tests/qa-score-progression.test.js
          node tests/qa-state-machine.test.js

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      # Copy only production files to dist/ — exclude tests, config, .github [Fix 9]
      - name: Prepare deployment
        run: |
          mkdir dist
          cp index.html dist/
          cp -r js/ dist/js/
          cp -r css/ dist/css/
          cp .nojekyll dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
